<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Universe Game v1.0.0 - Big Bang Contemplation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at top, #13133a 0%, #090916 65%, #05050d 100%);
            color: #f4f4ff;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        }
        canvas { display: block; }
        .ui {
            position: absolute;
            top: 16px;
            left: 16px;
            max-width: 360px;
            background: rgba(5, 5, 20, 0.7);
            border: 1px solid rgba(170, 160, 255, 0.25);
            backdrop-filter: blur(6px);
            color: #f1f1ff;
            padding: 14px 16px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.4;
        }
        .row { display: flex; align-items: center; gap: 8px; }
        .dim { color: #c8c5ee; font-size: 11px; }
        .legend { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 4px 10px; margin-top: 8px; }
        .chip { width: 8px; height: 8px; border-radius: 999px; display: inline-block; margin-right: 6px; }
        .controls {
            position: absolute;
            right: 16px;
            top: 16px;
            display: flex;
            gap: 8px;
        }
        button {
            border: 1px solid rgba(183, 175, 255, 0.35);
            background: rgba(12, 12, 36, 0.78);
            color: #f5f4ff;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px;
            cursor: pointer;
        }
        button:hover { background: rgba(25, 25, 66, 0.85); }
        button:focus-visible { outline: 2px solid #a78bfa; outline-offset: 2px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui">
        <div class="row">
            <div class="w-3 h-3 bg-pink-400 rounded-full animate-pulse"></div>
            <strong>Universe Game v1.0.0</strong>
        </div>
        <div class="dim" id="stats">Particles: 0 | Amor: 0 | FPS: 0</div>
        <div class="dim" id="state">State: Running</div>
        <div class="legend dim" id="legend">
            <span><span class="chip" style="background:#ef4444"></span>Pulse</span>
            <span><span class="chip" style="background:#22c55e"></span>Bloom</span>
            <span><span class="chip" style="background:#3b82f6"></span>Echo</span>
            <span><span class="chip" style="background:#a855f7"></span>Void</span>
            <span><span class="chip" style="background:#ec4899"></span>Amor</span>
        </div>
        <div class="dim" id="helpText">Drag: pan • Scroll: zoom • Space: pause • R: reset • H: toggle help</div>
    </div>

    <div class="controls">
        <button id="pauseBtn" type="button">Pause</button>
        <button id="resetBtn" type="button">Big Bang Reset</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');
        const stateEl = document.getElementById('state');
        const helpTextEl = document.getElementById('helpText');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        let WIDTH = window.innerWidth;
        let HEIGHT = window.innerHeight;
        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        // World size (very large)
        const WORLD_SIZE = 6000;

        // Camera
        let camera = {
            x: WORLD_SIZE / 2,
            y: WORLD_SIZE / 2,
            zoom: 0.8
        };

        let isDragging = false;
        let lastMouseX = 0;
        let lastMouseY = 0;

        // Archetypes
        const ARCHETYPES = {
            PULSE: { name: 'Pulse', color: '#ef4444', size: 5, reactivity: 0.9 },
            BLOOM: { name: 'Bloom', color: '#22c55e', size: 6, reactivity: 0.6 },
            ECHO:  { name: 'Echo',  color: '#3b82f6', size: 5, reactivity: 0.4 },
            VOID:  { name: 'Void',  color: '#a855f7', size: 7, reactivity: 0.85 },
            AMOR:  { name: 'Amor',  color: '#ec4899', size: 8, reactivity: 1.0 }
        };

        class Particle {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 3.5;
                this.vy = (Math.random() - 0.5) * 3.5;
                this.type = type;
                this.archetype = ARCHETYPES[type];
                this.love = type === 'AMOR' ? 85 : Math.random() * 35;
                this.radius = this.archetype.size;
                this.life = 1.0;
            }

            update(particles) {
                let ax = 0, ay = 0;

                for (let other of particles) {
                    if (other === this) continue;
                    const dx = other.x - this.x;
                    const dy = other.y - this.y;
                    const distSq = dx*dx + dy*dy;
                    if (distSq < 1) continue;
                    const dist = Math.sqrt(distSq);

                    let force = 0;
                    const isAmor = this.type === 'AMOR' || other.type === 'AMOR';

                    if (dist < 120) {
                        if (isAmor) {
                            force = 0.08; // Love attracts
                        } else if (this.type === other.type) {
                            force = -0.03;
                        } else {
                            force = (this.archetype.reactivity - other.archetype.reactivity) * 0.12;
                        }

                        ax += (dx / dist) * force;
                        ay += (dy / dist) * force;
                    }
                }

                this.vx = this.vx * 0.96 + ax;
                this.vy = this.vy * 0.96 + ay;

                this.x += this.vx;
                this.y += this.vy;

                // World bounds (soft)
                if (this.x < 100) this.vx += 0.4;
                if (this.x > WORLD_SIZE - 100) this.vx -= 0.4;
                if (this.y < 100) this.vy += 0.4;
                if (this.y > WORLD_SIZE - 100) this.vy -= 0.4;

                // Love decay / growth
                if (Math.random() < 0.02) this.love = Math.max(0, this.love - 0.3);
            }

            draw() {
                const screenX = (this.x - camera.x) * camera.zoom + WIDTH / 2;
                const screenY = (this.y - camera.y) * camera.zoom + HEIGHT / 2;
                const screenRadius = this.radius * camera.zoom;

                ctx.fillStyle = this.archetype.color;
                ctx.beginPath();
                ctx.arc(screenX, screenY, screenRadius, 0, Math.PI * 2);
                ctx.fill();

                // Glow for Amor
                if (this.type === 'AMOR') {
                    ctx.shadowColor = '#ec4899';
                    ctx.shadowBlur = 25;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
        }

        let particles = [];
        let paused = false;

        // Big Bang spawn
        function bigBang() {
            particles = [];
            const centerX = WORLD_SIZE / 2;
            const centerY = WORLD_SIZE / 2;

            // Proportions: more stable/less reactive, fewer Amor and high reactivity
            const counts = {
                PULSE: 35,
                BLOOM: 65,
                ECHO:  55,
                VOID:  28,
                AMOR:  12
            };

            for (let type in counts) {
                for (let i = 0; i < counts[type]; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2.2 + Math.random() * 2.8;
                    const dist = 35 + Math.random() * 95;

                    const p = new Particle(
                        centerX + Math.cos(angle) * dist,
                        centerY + Math.sin(angle) * dist,
                        type
                    );
                    p.vx = Math.cos(angle) * speed;
                    p.vy = Math.sin(angle) * speed;
                    particles.push(p);
                }
            }
        }

        let lastTime = Date.now();
        let frameCount = 0;
        let fps = 0;

        function renderFrame() {
            ctx.fillStyle = 'rgba(10, 10, 31, 0.12)';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            if (!paused) {
                for (let p of particles) p.update(particles);
            }

            for (let p of particles) p.draw();

            frameCount++;
            if (Date.now() - lastTime > 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = Date.now();
            }

            statsEl.textContent =
                `Particles: ${particles.length} | Amor: ${particles.filter(p => p.type === 'AMOR').length} | FPS: ${fps}`;
            stateEl.textContent = `State: ${paused ? 'Paused' : 'Running'}`;
            pauseBtn.textContent = paused ? 'Resume' : 'Pause';

            requestAnimationFrame(renderFrame);
        }

        // Controls
        canvas.addEventListener('mousedown', e => {
            isDragging = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });

        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            const dx = (e.clientX - lastMouseX) / camera.zoom;
            const dy = (e.clientY - lastMouseY) / camera.zoom;
            camera.x -= dx;
            camera.y -= dy;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });

        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const factor = e.deltaY > 0 ? 0.9 : 1.12;
            camera.zoom *= factor;
            camera.zoom = Math.max(0.15, Math.min(camera.zoom, 3.5));
        }, { passive: false });

        // Touch support for mobile
        let lastTouchX = 0, lastTouchY = 0;
        canvas.addEventListener('touchstart', e => {
            if (e.touches.length === 1) {
                isDragging = true;
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            }
        });

        canvas.addEventListener('touchmove', e => {
            if (!isDragging || e.touches.length !== 1) return;
            const dx = (e.touches[0].clientX - lastTouchX) / camera.zoom;
            const dy = (e.touches[0].clientY - lastTouchY) / camera.zoom;
            camera.x -= dx;
            camera.y -= dy;
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
            e.preventDefault();
        });

        canvas.addEventListener('touchend', () => isDragging = false);

        function togglePause() {
            paused = !paused;
        }

        function resetUniverse() {
            paused = false;
            bigBang();
        }

        function toggleHelp() {
            helpTextEl.classList.toggle('hidden');
        }

        pauseBtn.addEventListener('click', togglePause);
        resetBtn.addEventListener('click', resetUniverse);

        window.addEventListener('keydown', e => {
            const key = e.key.toLowerCase();
            if (key === ' ') {
                e.preventDefault();
                togglePause();
            } else if (key === 'r') {
                resetUniverse();
            } else if (key === 'h') {
                toggleHelp();
            }
        });

        // Resize
        window.addEventListener('resize', () => {
            WIDTH = window.innerWidth;
            HEIGHT = window.innerHeight;
            canvas.width = WIDTH;
            canvas.height = HEIGHT;
        });

        // Start the universe
        bigBang();
        renderFrame();

        console.log('%cUniverse Game v1.0.0 started - Big Bang complete', 'color:#c026d3; font-size:13px');
    </script>
</body>
</html>
